$kind: http-request
description: |-
  Tanya chatbot seputar data task. Chatbot akan query database terlebih dahulu (RAG), lalu kirim ke Gemini AI.

  Contoh pertanyaan:
  - Berapa jumlah task yang sudah selesai?
  - Tampilkan task yang belum dikerjakan
  - Siapa assignee dari task [judul]?
  - Task apa saja yang deadlinenya hari ini?
url: "{{base_url}}/chatbot"
method: POST
headers:
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "question": "Berapa jumlah task yang sudah selesai?"
    }
examples: ./.resources/Ask Chatbot.resources/examples
order: 1000
