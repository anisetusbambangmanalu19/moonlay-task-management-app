$kind: http-example
request:
  url: "{{base_url}}/chatbot"
  method: POST
  headers:
    Authorization: Bearer {{token}}
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "question": "Berapa jumlah task yang sudah selesai?"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: |-
      {
        "error": "Konfigurasi API chatbot tidak lengkap. Periksa GEMINI_API_KEY di .env"
      }
order: 2000
