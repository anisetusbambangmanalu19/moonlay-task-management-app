$kind: http-example
request:
  url: "{{base_url}}/tasks/{{task_id}}/status"
  method: PATCH
  headers:
    Authorization: Bearer {{token}}
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "status": "done"
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: text
    content: |-
      {
        "error": "Status tidak valid. Pilihan: todo, in_progress, done"
      }
order: 2000
