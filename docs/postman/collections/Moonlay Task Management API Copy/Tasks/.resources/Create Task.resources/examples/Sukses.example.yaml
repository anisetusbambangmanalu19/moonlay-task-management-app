$kind: http-example
request:
  url: "{{base_url}}/tasks"
  method: POST
  headers:
    Authorization: Bearer {{token}}
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "title": "Setup database PostgreSQL",
        "description": "Buat tabel users dan tasks sesuai schema yang ditentukan",
        "status": "todo",
        "deadline": "2026-07-10T10:00:00Z",
        "assignee_id": 2
      }
response:
  statusCode: 201
  statusText: Created
  body:
    type: text
    content: |-
      {
        "message": "Task berhasil dibuat",
        "data": {
          "id": 5,
          "title": "Setup database PostgreSQL",
          "status": "todo",
          "deadline": "2026-07-10T10:00:00Z",
          "assignee": { "id": 2, "name": "Anisetus" }
        }
      }
order: 1000
