$kind: http-example
request:
  url: "{{base_url}}/auth/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "email": "admin@moonlay.com",
        "password": "admin123"
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
        "user": {
          "id": 1,
          "name": "Admin",
          "email": "admin@moonlay.com"
        }
      }
order: 1000
