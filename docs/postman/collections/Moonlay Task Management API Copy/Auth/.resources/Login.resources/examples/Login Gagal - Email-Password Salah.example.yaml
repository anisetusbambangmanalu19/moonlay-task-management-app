$kind: http-example
name: Login Gagal - Email/Password Salah
request:
  url: "{{base_url}}/auth/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "email": "admin@moonlay.com",
        "password": "admin123"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  body:
    type: text
    content: |-
      {
        "error": "Email atau password salah"
      }
order: 2000
